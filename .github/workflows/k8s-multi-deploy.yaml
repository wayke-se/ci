on:
  workflow_call:
    inputs:
      service:
        type: string
        required: true
      images:
        type: string
        required: false
        description: 'Comma-separated list of images. E.g., container1=image1,container2=image2'
      cluster:
        type: string
        required: true
      environment:
        type: string
        required: true
      kustomize:
        type: string
        required: true
      watch:
        type: boolean
        required: false
        default: false
      rollout-targets:
        type: string
        required: false
        default: ''
        description: 'Comma-separated deployment names to watch. Defaults to `service` when empty.'
      sentry-config-map:
        type: string
        required: false
      publish-to-northstar:
        type: boolean
        required: false
        default: true
        description: 'Publish repo state to wayke-se/northstar after a successful deploy on main/master/test. Set to false to opt out.'
    secrets:
      credentials:
        required: true
      anthropic-api-key:
        required: false
      northstar-write-token:
        required: false

name: "Deploy multi-container dockerized application"

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Prepare deployment files
        run: |
          pushd deploy/base
          IFS=',' read -ra IMAGES <<< "${{ inputs.images }}"
          for i in "${IMAGES[@]}"; do
            CONTAINER=$(echo "$i" | cut -d '=' -f1)
            IMAGE=$(echo "$i" | cut -d '=' -f2)
            echo "Setting $CONTAINER to $IMAGE"
            kustomize edit set image $CONTAINER="$IMAGE"
          done
          popd

      - name: Set Sentry environment variables
        if: inputs.sentry-config-map
        run: |
          pushd ${{ inputs.kustomize }}
          kustomize edit add patch --kind ConfigMap --name ${{ inputs.sentry-config-map }} --patch "[\
              {\"op\": \"add\", \"path\": \"/data/SENTRY_RELEASE\", \"value\": \"${{ github.sha }}\"},\
              {\"op\": \"add\", \"path\": \"/data/SENTRY_ENVIRONMENT\", \"value\": \"${{ inputs.environment }}\"}\
            ]"
          popd

      - uses: azure/login@v3
        with:
          creds: ${{ secrets.credentials }}

      - name: Connect to Azure Kubernetes Service
        uses: azure/aks-set-context@v5
        with:
          cluster-name: ${{ inputs.cluster }}
          resource-group: ${{ inputs.environment }}
          admin: "true"

      - name: Dry run Kustomize to verify deploy files
        run: |
          kubectl apply --dry-run=client --kustomize ${{ inputs.kustomize }}

      - name: Deploy to Azure Kubernetes Service
        run: |
          kubectl apply --kustomize ${{ inputs.kustomize }}

      - name: Watch rollout
        if: ${{ inputs.watch }}
        run: |
          TARGETS="${{ inputs.rollout-targets }}"
          if [ -z "$TARGETS" ]; then
            TARGETS="${{ inputs.service }}"
          fi
          IFS=',' read -ra DEPLOYS <<< "$TARGETS"
          for d in "${DEPLOYS[@]}"; do
            kubectl rollout status deploy/"$d" --watch
          done

  publish-northstar:
    needs: deploy-app
    if: ${{ inputs.publish-to-northstar && (github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'test') }}
    uses: ./.github/workflows/northstar-publish.yaml
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
      NORTHSTAR_WRITE_TOKEN: ${{ secrets.northstar-write-token }}

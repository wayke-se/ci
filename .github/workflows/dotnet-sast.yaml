on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        required: true
      snyk-test:
        type: boolean
        required: false
        default: false
      snyk-code:
        type: boolean
        required: false
        default: false
      ignore-advisories:
        type: string
        required: false
        default: ""
        description: "Space-separated list of GHSA advisory IDs to ignore (e.g. 'GHSA-rvv3-g6hj-g44x')."
    secrets:
      nuget-token:
        required: false
      snyk-token:
        required: false

name: "Run SAST for .NET"

jobs:
  package-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      
      - name: Configure NuGet for private packages
        run: |
          [ ! -z "${{ secrets.nuget-token }}" ] && dotnet nuget update source "wayke-gh" --store-password-in-clear-text --configfile NuGet.Config -u "ourbjorn" -p "${{ secrets.nuget-token }}" || true

      - name: Download dependencies
        run: |
          dotnet restore

      - name: Run package scanner
        env:
          IGNORE_ADVISORIES: ${{ inputs.ignore-advisories }}
        run: |
          RESULT=$(dotnet list package --vulnerable --include-transitive)
          echo "${RESULT}"

          TOTAL=$(echo "${RESULT}" | grep -c "https://github.com/advisories/" || true)
          IGNORED=0
          for adv in ${IGNORE_ADVISORIES}; do
            MATCHES=$(echo "${RESULT}" | grep -c "${adv}" || true)
            if [ "${MATCHES}" -gt 0 ]; then
              echo "Ignoring ${MATCHES} occurrence(s) of advisory: ${adv}"
              IGNORED=$((IGNORED + MATCHES))
            fi
          done

          REMAINING=$((TOTAL - IGNORED))
          if [ "${REMAINING}" -gt 0 ]; then
            echo "Found ${REMAINING} un-ignored vulnerable package reference(s)."
            exit 1
          fi

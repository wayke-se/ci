on:
  workflow_call:
    inputs:
      service:
        type: string
        required: true
      k8s-service-file:
        type: string
        required: true
      image:
        type: string
        required: true
      cluster:
        type: string
        required: true
      environment:
        type: string
        required: true
      kustomize:
        type: string
        required: true
      sentry-config-map:
        type: string
        required: false
      publish-to-northstar:
        type: boolean
        required: false
        default: true
        description: 'Publish repo state to wayke-se/northstar after a successful deploy on main/master/test. Set to false to opt out.'
    secrets:
      credentials:
        required: true
      anthropic-api-key:
        required: false
      northstar-write-token:
        required: false

name: "Blue/green deploy dockerized application"

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare deployment files
        run: |
          pushd deploy/base
          kustomize edit set image ${{ inputs.service }}="${{ inputs.image }}"
          popd

      - name: Set Sentry environment variables
        if: inputs.sentry-config-map
        run: |
          pushd ${{ inputs.kustomize }}
          kustomize edit add patch --kind ConfigMap --name ${{ inputs.sentry-config-map }} --patch "[\
              {\"op\": \"add\", \"path\": \"/data/SENTRY_RELEASE\", \"value\": \"${{ github.sha }}\"},\
              {\"op\": \"add\", \"path\": \"/data/SENTRY_ENVIRONMENT\", \"value\": \"${{ inputs.environment }}\"}\
            ]"
          popd

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - uses: azure/login@v3
        with:
          creds: ${{ secrets.credentials }}

      - name: Connect to Azure Kubernetes Service
        uses: azure/aks-set-context@v5
        with:
          cluster-name: ${{ inputs.cluster }}
          resource-group: ${{ inputs.environment }}
          admin: "true"

      - name: Dry run Kustomize to verify deploy files
        run: |
          kubectl apply --dry-run=client --kustomize ${{ inputs.kustomize }}

      - name: Connect and deploy using blue/green deployment strategy
        uses: wayke-se/ci/.github/actions/k8s/blue-green-deploy@master
        with:
          app-name: ${{ inputs.service }}
          app-version: ${{ github.sha }}
          service-file: ${{ inputs.k8s-service-file }}
          kustomize: ${{ inputs.kustomize }}
          credentials: ${{ secrets.credentials }}
          resource-group: ${{ inputs.environment }}
          cluster: ${{ inputs.cluster }}

  publish-northstar:
    needs: deploy-app
    if: ${{ inputs.publish-to-northstar && (github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'test') }}
    uses: ./.github/workflows/northstar-publish.yaml
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
      NORTHSTAR_WRITE_TOKEN: ${{ secrets.northstar-write-token }}
